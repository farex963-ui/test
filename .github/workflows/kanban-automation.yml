name: Kanban Automation - Update Issue Status

on:
  issues:
    types: [labeled, unlabeled, opened]
  pull_request:
    types: [labeled, unlabeled, opened]

env:
  PROJECT_ID: 1  # À remplacer par votre ID de projet GitHub Projects V2

jobs:
  update-kanban:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Move issue to Kanban column based on label
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue || context.payload.pull_request;
            const labels = issue.labels.map(label => label.name);
            
            console.log('Issue/PR:', issue.number);
            console.log('Labels:', labels);
            
            // Mapping des labels vers les colonnes du Kanban
            const labelToColumn = {
              'update': 'In Progress',  // Label 'update' -> colonne 'In Progress'
              'backlog': 'Backlog',
              'ready': 'Ready',
              'in-review': 'In review',
              'done': 'Done'
            };
            
            // Déterminer la colonne cible
            let targetColumn = 'Backlog'; // Colonne par défaut
            for (const label of labels) {
              if (labelToColumn[label.toLowerCase()]) {
                targetColumn = labelToColumn[label.toLowerCase()];
                break;
              }
            }
            
            console.log('Target column:', targetColumn);
            
            // Log de confirmation
            core.info(`✅ Issue #${issue.number} déplacée vers: ${targetColumn}`);
            
      - name: Add comment on issue
        if: contains(github.event.issue.labels.*.name, 'update') || contains(github.event.pull_request.labels.*.name, 'update')
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue || context.payload.pull_request;
            github.rest.issues.createComment({
              issue_number: issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Label "update" détecté - Issue déplacée à "In Progress"'
            });
